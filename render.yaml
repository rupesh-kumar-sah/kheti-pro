services:
  - type: web
    name: khetismart
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: AI_INTEGRATIONS_GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
